
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Aether</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="room-layout">
    <div class="main-area">
      <div class="room-header">
        <span>Room code: <strong id="roomCodeDisplay">...</strong></span>
        <button id="copyLinkBtn">Copy invite link</button>
      </div>

      <div class="video-area" id="videoArea">
        <video id="mediaVideo" playsinline></video>
        <p class="placeholder-text" id="placeholderText">🎥 No one is sharing a video yet.<br>Pick a file from your computer to start watching together.</p>
        <div id="reactionLayer" class="reaction-layer"></div>
      </div>

      <div class="player-controls" id="playerControls" style="display:none;">
        <div class="controls-row">
          <button id="playPauseBtn">Pause</button>
          <span id="hostLabel" class="host-label"></span>
          <button id="stopSharingBtn" style="display:none;">Stop sharing</button>
        </div>
        <div class="controls-row">
          <span id="currentTimeLabel" class="time-label">0:00</span>
          <input type="range" id="seekSlider" min="0" max="100" step="0.1" value="0" class="seek-slider">
          <span id="durationLabel" class="time-label">0:00</span>
        </div>
        <div class="controls-row">
          <div class="volume-control">
            <label for="volumeSlider">Volume</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
          </div>
        </div>
      </div>

      <div class="share-row" id="shareRow">
        <label class="file-picker-label" for="filePicker">📁 Share a video from your computer</label>
        <input type="file" id="filePicker" accept="video/*" style="display:none;">
      </div>

      <div class="reaction-bar">
        <button class="reaction-btn" data-emoji="😂">😂</button>
        <button class="reaction-btn" data-emoji="❤️">❤️</button>
        <button class="reaction-btn" data-emoji="😮">😮</button>
        <button class="reaction-btn" data-emoji="👏">👏</button>
        <button class="reaction-btn" data-emoji="🔥">🔥</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="participants">
        <h3>In this room</h3>
        <ul id="participantList"></ul>
      </div>

      <div class="chat">
        <div id="chatLog" class="chat-log"></div>
        <div class="chat-input-row">
          <input id="chatInput" type="text" placeholder="Say something..." maxlength="500">
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
