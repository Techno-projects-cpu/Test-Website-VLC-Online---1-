
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Aether</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="player-body">

  <div class="menu-bar">
    <div class="menu-brand">
      <img src="logo.png" alt="" class="menu-logo">
      <span>Project Aether</span>
    </div>

    <div class="menu-item" id="mediaMenuWrap">
      <button class="menu-btn" id="mediaMenuBtn">Media ▾</button>
      <div class="menu-dropdown" id="mediaDropdown">
        <label class="menu-dropdown-item" for="filePicker">📁 Open Local File...</label>
        <input type="file" id="filePicker" accept="video/*" style="display:none;">
        <button class="menu-dropdown-item" id="menuOpenYoutube">▶️ Open YouTube Link...</button>
        <button class="menu-dropdown-item" id="menuOpenTwitch">🟣 Open Twitch Link...</button>
        <button class="menu-dropdown-item" id="menuOpenUrl">🔗 Open Direct Video URL...</button>
        <div class="menu-divider"></div>
        <label class="menu-dropdown-item" for="subtitlePicker">💬 Load Subtitles (.srt/.vtt)...</label>
        <input type="file" id="subtitlePicker" accept=".srt,.vtt" style="display:none;">
        <div class="menu-divider"></div>
        <button class="menu-dropdown-item" id="menuStopSharing" style="display:none;">⏹ Stop Sharing</button>
      </div>
    </div>

    <span class="menu-room-code">Room: <strong id="roomCodeDisplay">...</strong></span>
    <button class="menu-btn" id="copyLinkBtn">Copy invite link</button>
  </div>

  <!-- Source input modal (used for YouTube / Twitch / direct URL) -->
  <div class="source-modal" id="sourceModal" style="display:none;">
    <div class="source-modal-box">
      <h3 id="sourceModalTitle">Open Link</h3>
      <input type="text" id="sourceModalInput" placeholder="Paste link here...">
      <div class="source-modal-actions">
        <button id="sourceModalCancel">Cancel</button>
        <button id="sourceModalConfirm">Load</button>
      </div>
    </div>
  </div>

  <div class="room-layout">
    <div class="main-area">
      <div class="player-shell">
        <div class="video-area" id="videoArea">
          <video id="mediaVideo" playsinline><track id="subtitleTrack" kind="subtitles" src="" default></video>
          <div id="youtubePlayer" class="embed-player"></div>
          <div id="twitchPlayer" class="embed-player"></div>
          <div class="placeholder-text" id="placeholderText">
            <div class="no-signal">NO SIGNAL</div>
            <div class="placeholder-sub">Use the <strong>Media</strong> menu above to load a local file, YouTube, Twitch, or direct video link.</div>
          </div>
          <div id="reactionLayer" class="reaction-layer"></div>
        </div>

        <div class="player-controls" id="playerControls" style="display:none;">
          <div class="seek-row">
            <span id="currentTimeLabel" class="time-label">0:00</span>
            <input type="range" id="seekSlider" min="0" max="1000" step="1" value="0" class="seek-slider">
            <span id="durationLabel" class="time-label">0:00</span>
          </div>
          <div class="controls-row">
            <button id="playPauseBtn" class="icon-btn" title="Play/Pause">
              <svg id="playIcon" viewBox="0 0 24 24" width="16" height="16"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
              <svg id="pauseIcon" viewBox="0 0 24 24" width="16" height="16" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z" fill="currentColor"/></svg>
            </button>
            <div class="volume-control">
              <svg viewBox="0 0 24 24" width="15" height="15"><path d="M3 10v4h4l5 5V5L7 10H3z" fill="currentColor"/></svg>
              <input type="range" id="volumeSlider" min="0" max="100" step="1" value="100">
            </div>
            <button id="ccBtn" class="icon-btn text-icon-btn" title="Subtitles" style="display:none;">CC</button>
            <span id="hostLabel" class="host-label"></span>
            <button id="fullscreenBtn" class="icon-btn" title="Fullscreen">
              <svg viewBox="0 0 24 24" width="15" height="15"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="reaction-bar">
        <button class="reaction-btn" data-emoji="😂">😂</button>
        <button class="reaction-btn" data-emoji="❤️">❤️</button>
        <button class="reaction-btn" data-emoji="😮">😮</button>
        <button class="reaction-btn" data-emoji="👏">👏</button>
        <button class="reaction-btn" data-emoji="🔥">🔥</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="participants">
        <h3>In this room</h3>
        <ul id="participantList"></ul>
      </div>

      <div class="chat">
        <div id="chatLog" class="chat-log"></div>
        <div class="chat-input-row">
          <input id="chatInput" type="text" placeholder="Say something..." maxlength="500">
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://embed.twitch.tv/embed/v1.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
